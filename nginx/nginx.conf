events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile        on;
  keepalive_timeout 65;
  client_max_body_size 20m;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
  gzip_vary on;

  # Security headers (applied globally)
  add_header X-Frame-Options         "SAMEORIGIN"                   always;
  add_header X-Content-Type-Options  "nosniff"                      always;
  add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
  add_header X-XSS-Protection        "1; mode=block"                always;

  # Upstream services
  upstream backend  { server backend:3001;  keepalive 32; }
  upstream frontend { server frontend:3000; keepalive 32; }

  # ── HTTP → HTTPS redirect + ACME challenge ───────────────────────────────
  server {
    listen 80;
    server_name ${NGINX_DOMAIN};

    # Let certbot prove domain ownership
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    # Everything else → HTTPS
    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── HTTPS ──────────────────────────────────────────────────────────────────
  server {
    listen 443 ssl;
    server_name ${NGINX_DOMAIN};
    http2 on;

    # SSL certificates (issued by certbot)
    ssl_certificate     /etc/letsencrypt/live/${NGINX_DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${NGINX_DOMAIN}/privkey.pem;

    # Strong SSL config
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Backend API ────────────────────────────────────────────────────────
    location /api/ {
      proxy_pass         http://backend/api/;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade          $http_upgrade;
      proxy_set_header   Connection       "upgrade";
      proxy_set_header   Host             $http_host;
      proxy_set_header   X-Real-IP        $remote_addr;
      proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto https;
      proxy_read_timeout 120s;
      proxy_send_timeout 120s;
    }

    # ── Frontend (Next.js) ─────────────────────────────────────────────────
    location / {
      proxy_pass         http://frontend;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade          $http_upgrade;
      proxy_set_header   Connection       "upgrade";
      proxy_set_header   Host             $http_host;
      proxy_set_header   X-Real-IP        $remote_addr;
      proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto https;
    }

    # ── Next.js static assets (cache aggressively) ─────────────────────────
    location /_next/static/ {
      proxy_pass http://frontend/_next/static/;
      expires 1y;
      add_header Cache-Control "public, immutable";
    }
  }
}
